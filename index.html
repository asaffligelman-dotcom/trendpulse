<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg-body: #09090b;
  --bg-surface: #18181b;
  --bg-card: #1e1e23;
  --bg-elevated: #27272a;
  --bg-hover: #2e2e33;
  --bg-active: #3f3f46;
  --text-primary: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --ring: rgba(99,102,241,0.4);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px rgba(99,102,241,0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);

  /* Platform colors */
  --c-facebook: #1877f2;
  --c-instagram: #e4405f;
  --c-tiktok: #25f4ee;
  --c-twitter: #1d9bf0;
  --c-linkedin: #0a66c2;
  --c-youtube: #ff0000;

  /* Category colors */
  --c-finance: #10b981;
  --c-health: #f472b6;
  --c-culture: #a78bfa;
  --c-politics: #fb923c;
  --c-music: #f87171;
  --c-all: #818cf8;
}

/* ===== RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-body);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== HEADER ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(9,9,11,0.8);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
}

.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 24px;
}

.brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; flex-shrink: 0;
}

.brand-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #818cf8, #6366f1);
  border-radius: 8px;
  display: grid; place-items: center;
  position: relative;
  overflow: hidden;
}

.brand-mark::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2));
}

.brand-mark svg { width: 18px; height: 18px; position: relative; z-index: 1; }

.brand-text {
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #e0e7ff, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* Date Navigation */
.date-nav {
  display: flex; align-items: center; gap: 4px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
}

.date-btn {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: transparent;
  border: none; border-radius: 7px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}

.date-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

.date-btn svg { width: 16px; height: 16px; }

.date-label {
  padding: 0 12px;
  font-size: 13px; font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  cursor: pointer;
  position: relative;
}

.date-label input {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}

/* Search */
.search-box {
  position: relative;
  width: 240px;
  flex-shrink: 0;
}

.search-box input {
  width: 100%;
  height: 36px;
  padding: 0 12px 0 36px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: var(--transition);
}

.search-box input::placeholder { color: var(--text-muted); }
.search-box input:focus { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px var(--ring); }

.search-box svg {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: var(--text-muted); pointer-events: none;
}

/* ===== MAIN ===== */
.main {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px 32px 60px;
}

/* ===== KPI ROW ===== */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.kpi-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  opacity: 0;
  transition: var(--transition);
}

.kpi-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
.kpi-card:hover::before { opacity: 1; }
.kpi-card.active { border-color: rgba(99,102,241,0.3); }
.kpi-card.active::before { opacity: 1; }

.kpi-card[data-cat="finance"]::before { background: var(--c-finance); }
.kpi-card[data-cat="health"]::before { background: var(--c-health); }
.kpi-card[data-cat="culture"]::before { background: var(--c-culture); }
.kpi-card[data-cat="politics"]::before { background: var(--c-politics); }
.kpi-card[data-cat="music"]::before { background: var(--c-music); }

.kpi-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}

.kpi-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}

.kpi-value {
  font-size: 26px; font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 2px;
}

.kpi-sub { font-size: 12px; color: var(--text-muted); }

/* ===== CHARTS ROW ===== */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px 20px;
}

.chart-title {
  font-size: 13px; font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 14px;
}

.chart-wrap { position: relative; height: 160px; }

/* ===== PLATFORM TABS ===== */
.tabs-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
  overflow-x: auto;
  scrollbar-width: none;
}

.tabs-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border: none; background: transparent;
  color: var(--text-muted);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: var(--transition);
}

.tab-btn:hover { color: var(--text-secondary); }

.tab-btn.active {
  color: var(--text-primary);
  border-bottom-color: #818cf8;
}

.tab-icon {
  width: 20px; height: 20px;
  border-radius: 5px;
  display: grid; place-items: center;
  font-size: 9px; font-weight: 800;
  color: #fff;
  flex-shrink: 0;
}

.tab-icon.facebook { background: var(--c-facebook); }
.tab-icon.instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.tab-icon.tiktok { background: #000; outline: 1px solid var(--c-tiktok); outline-offset: -1px; color: var(--c-tiktok); }
.tab-icon.twitter { background: #000; outline: 1px solid var(--c-twitter); outline-offset: -1px; color: var(--c-twitter); }
.tab-icon.linkedin { background: var(--c-linkedin); }
.tab-icon.youtube { background: var(--c-youtube); }

.tab-count {
  background: var(--bg-elevated);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11px;
  color: var(--text-muted);
}

.tab-btn.active .tab-count { background: rgba(99,102,241,0.15); color: #a5b4fc; }

/* ===== TREND GRID ===== */
.trend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 12px;
  animation: fadeUp 300ms ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== TREND CARD ===== */
.trend-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  display: flex;
  gap: 14px;
  transition: var(--transition);
  position: relative;
}

.trend-card:hover {
  border-color: var(--border-hover);
  background: var(--bg-card);
  box-shadow: var(--shadow-md);
}

.trend-rank-badge {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  display: grid; place-items: center;
  font-weight: 800; font-size: 13px;
  flex-shrink: 0;
  position: relative;
}

.trend-rank-badge.gold {
  background: linear-gradient(135deg, #fbbf24, #d97706);
  color: #451a03;
  box-shadow: 0 2px 8px rgba(251,191,36,0.3);
}

.trend-rank-badge.silver {
  background: linear-gradient(135deg, #d4d4d8, #a1a1aa);
  color: #27272a;
}

.trend-rank-badge.bronze {
  background: linear-gradient(135deg, #d97706, #92400e);
  color: #fef3c7;
}

.trend-rank-badge.other {
  background: var(--bg-elevated);
  color: var(--text-muted);
}

.trend-body { flex: 1; min-width: 0; }

.trend-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.trend-name {
  font-size: 15px; font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.cat-pill {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 6px;
  white-space: nowrap;
}

.cat-pill.finance { background: rgba(16,185,129,0.12); color: #34d399; }
.cat-pill.health { background: rgba(244,114,182,0.12); color: #f9a8d4; }
.cat-pill.culture { background: rgba(167,139,250,0.12); color: #c4b5fd; }
.cat-pill.politics { background: rgba(251,146,60,0.12); color: #fdba74; }
.cat-pill.music { background: rgba(248,113,113,0.12); color: #fca5a5; }

.trend-platform-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600;
  color: var(--text-muted);
  background: var(--bg-elevated);
  padding: 2px 8px;
  border-radius: 6px;
}

.trend-synopsis {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
}

/* ===== CROSS-PLATFORM VIEW ===== */
.cross-platform-section {
  margin-top: 8px;
}

.cross-platform-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}

.cross-platform-title {
  font-size: 15px; font-weight: 600;
  color: var(--text-primary);
}

/* ===== HISTORY SECTION ===== */
.history-section {
  margin-top: 32px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
}

.history-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}

.history-title {
  font-size: 15px; font-weight: 600;
  color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}

.history-title svg { width: 18px; height: 18px; color: var(--text-muted); }

.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 6px;
}

.history-btn {
  padding: 10px 8px;
  background: var(--bg-body);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px; font-weight: 500;
  text-align: center;
  transition: var(--transition);
}

.history-btn:hover { border-color: var(--border-hover); color: var(--text-secondary); }

.history-btn.current {
  border-color: rgba(99,102,241,0.4);
  color: #a5b4fc;
  background: rgba(99,102,241,0.06);
}

/* ===== EMPTY STATE ===== */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
}

.empty-state svg { width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px; }

.empty-state h3 {
  font-size: 16px; font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.empty-state p { font-size: 13px; color: var(--text-muted); }

/* ===== FOOTER ===== */
.footer {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px 32px;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .kpi-row { grid-template-columns: repeat(3, 1fr); }
  .charts-row { grid-template-columns: 1fr; }
  .search-box { width: 180px; }
}

@media (max-width: 768px) {
  .header { padding: 0 16px; }
  .main { padding: 16px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .trend-grid { grid-template-columns: 1fr; }
  .search-box { display: none; }
  .header-inner { gap: 12px; }
}

@media (max-width: 480px) {
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .date-label { font-size: 12px; padding: 0 8px; }
}

/* ===== TRANSITION STATES ===== */
.trend-grid.loading { opacity: 0.4; pointer-events: none; }

/* Print */
@media print {
  .header { position: static; backdrop-filter: none; }
  .search-box, .date-nav { display: none; }
  body { background: #fff; color: #000; }
  .trend-card, .kpi-card, .chart-card, .history-section { border: 1px solid #ccc; background: #fff; }
}
</style>

function formatDateLong(ds) {
  const d = new Date(ds + "T12:00:00");
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function getAllTrends(dateStr) {
  const dayData = TREND_DATA[dateStr];
  if (!dayData) return [];
  const all = [];
  PLATFORMS.forEach(p => {
    (dayData[p.id] || []).forEach((t, i) => {
      all.push({ ...t, platform: p.id, platformName: p.name, rank: i + 1 });
    });
  });
  return all;
}

function getFilteredTrends() {
  let trends = getAllTrends(state.date);
  if (state.platform !== "all") trends = trends.filter(t => t.platform === state.platform);
  if (state.category !== "all") trends = trends.filter(t => t.category === state.category);
  if (state.search) {
    const q = state.search.toLowerCase();
    trends = trends.filter(t => t.title.toLowerCase().includes(q) || t.synopsis.toLowerCase().includes(q));
  }
  return trends;
}

function getCategoryCounts(dateStr) {
  const all = getAllTrends(dateStr);
  const counts = {};
  CATEGORIES.forEach(c => counts[c.id] = 0);
  all.forEach(t => { if (counts[t.category] !== undefined) counts[t.category]++; });
  return counts;
}

function getPlatformCounts(dateStr) {
  const dayData = TREND_DATA[dateStr];
  if (!dayData) return {};
  const counts = {};
  PLATFORMS.forEach(p => counts[p.id] = (dayData[p.id] || []).length);

}

      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#71717a', font: { size: 11, weight: '600' } }, border: { display: false } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#71717a', font: { size: 11 }, stepSize: 1 }, border: { display: false }, beginAtZero: true }
      }
    }
  });
}

/* ===== RENDER: TABS ===== */
function renderTabs() {
  const el = document.getElementById('tabsBar');
  const platCounts = getPlatformCounts(state.date);
  const total = Object.values(platCounts).reduce((a, b) => a + b, 0);

  let html = `<button class="tab-btn ${state.platform === 'all' ? 'active' : ''}" onclick="setPlatform('all')">
    <span>All</span><span class="tab-count">${total}</span>
  </button>`;

  PLATFORMS.forEach(p => {
    html += `<button class="tab-btn ${state.platform === p.id ? 'active' : ''}" onclick="setPlatform('${p.id}')">
      <span class="tab-icon ${p.id}">${p.icon}</span>
      <span>${p.name}</span>
      <span class="tab-count">${platCounts[p.id] || 0}</span>
    </button>`;
  });

  el.innerHTML = html;
}

/* ===== RENDER: TREND CARDS ===== */
function renderTrends() {
  const grid = document.getElementById('trendGrid');
  const trends = getFilteredTrends();

  if (trends.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><path d="M8 15s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
      <h3>No trends found</h3>
      <p>${state.search ? 'Try a different search term' : 'No data available for this date yet'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = trends.map(t => {
    const rankClass = t.rank === 1 ? 'gold' : t.rank === 2 ? 'silver' : t.rank === 3 ? 'bronze' : 'other';
    const showPlatform = state.platform === 'all';
    return `<article class="trend-card">
      <div class="trend-rank-badge ${rankClass}">${t.rank}</div>
      <div class="trend-body">
        <div class="trend-meta">
          <span class="trend-name">${highlight(t.title)}</span>
          <span class="cat-pill ${t.category}">${CAT_LABELS[t.category]}</span>
          ${showPlatform ? `<span class="trend-platform-badge">${t.platformName}</span>` : ''}
        </div>
        <p class="trend-synopsis">${highlight(t.synopsis)}</p>
      </div>
    </article>`;
  }).join('');
}

function highlight(text) {
  if (!state.search) return text;
  const regex = new RegExp(`(${state.search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark style="background:rgba(129,140,248,0.25);color:#e0e7ff;border-radius:2px;padding:0 2px">$1</mark>');
}

/* ===== RENDER: HISTORY ===== */
function renderHistory() {
  const grid = document.getElementById('historyGrid');
  const dates = Object.keys(TREND_DATA).sort().reverse();

  if (dates.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:24px;font-size:13px;">No historical data yet. Data accumulates day by day.</div>';
    return;
  }

  grid.innerHTML = dates.map(d => `
    <button class="history-btn ${d === state.date ? 'current' : ''}" onclick="jumpToDate('${d}')">
      ${new Date(d + "T12:00:00").toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
    </button>
  `).join('');
}

/* ===== ACTIONS ===== */
function setPlatform(p) { state.platform = p; renderTabs(); renderTrends(); }

function toggleCategory(c) {
  state.category = state.category === c ? "all" : c;
  renderKPIs(); renderTrends();
}

function changeDate(delta) {
  const d = new Date(state.date + "T12:00:00");
  d.setDate(d.getDate() + delta);
  state.date = d.toISOString().split('T')[0];
  state.search = '';
  document.getElementById('searchInput').value = '';
  render();
}

function jumpToDate(val) {
  if (!val) return;
  state.date = val;
  state.search = '';
  document.getElementById('searchInput').value = '';
  render();
}

function handleSearch(val) {
  state.search = val.trim();
  renderTrends();
}

/* ===== FULL RENDER ===== */
function render() {
  document.getElementById('dateLabelText').textContent = formatDateLong(state.date);
  document.getElementById('datePicker').value = state.date;
  renderKPIs();
  renderCharts();
  renderTabs();
  renderTrends();
  renderHistory();
}

/* ===== KEYBOARD NAV ===== */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') changeDate(-1);
  if (e.key === 'ArrowRight') changeDate(1);
  if (e.key === '/' && !e.metaKey && !e.ctrlKey) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
    state.search = '';
    document.getElementById('searchInput').value = '';
    renderTrends();
  }
});

/* ===== INIT ===== */
render();
</script>
</body>
</html>
